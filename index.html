<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tool Launcher</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
        background: linear-gradient(135deg, #0f172a, #1e1b4b);
        font-family: 'Segoe UI', Courier New, monospace;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        color: #e2e8f0;
    }
    .container {
        background: rgba(10,10,18,0.92);
        border-radius: 24px;
        border: 2px solid #a855f7;
        padding: 32px;
        width: 100%;
        max-width: 480px;
        text-align: center;
        box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    }
    h1 { color: #a855f7; margin-bottom: 16px; font-size: 28px; }
    .btn {
        background: linear-gradient(135deg, #a855f7, #ec489a);
        border: none;
        border-radius: 40px;
        padding: 14px 28px;
        color: white;
        font-weight: bold;
        font-size: 17px;
        cursor: pointer;
        width: 100%;
        margin: 12px 0;
        transition: all 0.2s;
    }
    .btn:hover { transform: scale(0.97); box-shadow: 0 8px 20px rgba(168,85,247,0.4); }
    .btn-secondary { background: linear-gradient(135deg, #3b82f6, #8b5cf6); }
    #log {
        background: #050508;
        border: 1px solid #a855f7;
        border-radius: 12px;
        padding: 16px;
        max-height: 180px;
        overflow-y: auto;
        font-size: 13px;
        margin-top: 20px;
        text-align: left;
    }
    .log-line { margin: 4px 0; color: #4ade80; }
    .error { color: #f87171; }
</style>
</head>
<body>

<div class="container">
    <h1>🔧 Tool Launcher</h1>
    <button class="btn" id="launch">🚀 LAUNCH TOOL</button>
    <button class="btn btn-secondary" id="open">🌐 OPEN realfeed.lol</button>
    
    <div id="log">
        <div class="log-line">[00:00] Launcher ready</div>
        <div class="log-line">[00:00] Click LAUNCH TOOL after you're logged in</div>
    </div>
</div>

<script>
function log(msg, type = 'info') {
    const area = document.getElementById('log');
    const line = document.createElement('div');
    line.className = 'log-line';
    if (type === 'error') line.className += ' error';
    line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    area.appendChild(line);
    area.scrollTop = area.scrollHeight;
}

async function launch() {
    log('Preparing launch...');

    let target = null;
    try {
        target = window.open('', 'realfeed');
    } catch(e) {}

    if (!target || target.closed) {
        log('Opening realfeed.lol in new tab...');
        target = window.open('https://realfeed.lol', 'realfeed');
        await new Promise(r => setTimeout(r, 3500));
    }

    if (!target || target.closed) {
        log('Could not open or find realfeed tab', 'error');
        return;
    }

    log('Target window ready. Injecting script...');

    const code = `
    (function() {
        if (typeof sb === 'undefined' || !window.currentProfile) {
            alert('Please refresh realfeed.lol and log in first.');
            return;
        }

        const box = document.createElement('div');
        box.style.cssText = 'position:fixed;bottom:20px;right:20px;width:340px;background:#0f172a;border:2px solid #a855f7;border-radius:16px;padding:16px;color:#e2e8f0;z-index:999999;box-shadow:0 10px 30px #00000080;';
        box.innerHTML = '<div style="color:#a855f7;font-weight:bold;font-size:18px;">Tool Active</div><p>Control panel would go here</p>';
        document.body.appendChild(box);

        console.log('[TOOL] Injected successfully');
    })();
    `;

    try {
        const script = target.document.createElement('script');
        script.textContent = code;
        target.document.body.appendChild(script);
        log('Injection completed ✓ Look bottom-right on realfeed page', 'success');
    } catch (err) {
        log('Could not inject directly (cross-origin block)', 'error');
        log('Open F12 console on realfeed.lol and paste the code from below', 'error');
        
        const ta = document.createElement('textarea');
        ta.value = code;
        ta.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:300px;z-index:9999999;background:#111;color:#0f0;font-family:monospace;padding:12px;border:2px solid #a855f7;';
        document.body.appendChild(ta);
        ta.select();
        
        setTimeout(() => {
            if (confirm('Copy done? Close box?')) ta.remove();
        }, 8000);
    }
}

document.getElementById('launch').onclick = launch;

document.getElementById('open').onclick = () => {
    window.open('https://realfeed.lol', 'realfeed');
    log('realfeed.lol opened in new tab');
};
</script>
</body>
</html>
